<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline Text Converter</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    background:#fff;
    width:100%;
    max-width:500px;
    border-radius:15px;
    padding:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

textarea{
    width:100%;
    height:180px;
    padding:12px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:10px;
    resize:none;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    margin-top:15px;
}

button{
    padding:12px;
    border:none;
    border-radius:10px;
    background:#007bff;
    color:#fff;
    font-size:15px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}
</style>
</head>

<body>

<div class="container">
<h2>Offline Text Converter</h2>

<textarea id="text" placeholder="Type or paste text here..."></textarea>

<div class="buttons">
<button onclick="upper()">UPPERCASE</button>
<button onclick="lower()">lowercase</button>
<button onclick="titleCase()">Title Case</button>
<button onclick="copyText()">Copy</button>
</div>

</div>

<script>

const txt=document.getElementById("text");

function upper(){
    txt.value=txt.value.toUpperCase();
}

function lower(){
    txt.value=txt.value.toLowerCase();
}

function titleCase(){
    txt.value=txt.value
    .toLowerCase()
    .split(" ")
    .map(word=>word.charAt(0).toUpperCase()+word.slice(1))
    .join(" ");
}

function copyText(){
    txt.select();
    document.execCommand("copy");
    alert("Copied!");
}

</script>

</body>
</html>
