name: build

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout build branch
        uses: actions/checkout@v4

      - name: Read build config
        id: cfg
        run: |
          set -e
          test -f build-config.json || { echo "::error::build-config.json missing"; exit 1; }
          test -d www || { echo "::error::www/ missing"; exit 1; }
          test -f www/index.html || { echo "::error::www/index.html missing"; exit 1; }
          echo "APP_NAME=$(jq -r .appName build-config.json)"       >> $GITHUB_OUTPUT
          echo "PACKAGE=$(jq -r .packageName build-config.json)"    >> $GITHUB_OUTPUT
          echo "VNAME=$(jq -r .versionName build-config.json)"      >> $GITHUB_OUTPUT
          echo "VCODE=$(jq -r .versionCode build-config.json)"      >> $GITHUB_OUTPUT
          echo "ORIENT=$(jq -r .orientation build-config.json)"     >> $GITHUB_OUTPUT

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Bootstrap Capacitor project
        env:
          APP_NAME: ${{ steps.cfg.outputs.APP_NAME }}
          PACKAGE:  ${{ steps.cfg.outputs.PACKAGE }}
        run: |
          set -e
          mkdir -p _cap && cd _cap
          npm init -y >/dev/null
          npm install --no-audit --no-fund \
            @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6
          cat > capacitor.config.json <<EOF
          {
            "appId": "${PACKAGE}",
            "appName": "${APP_NAME}",
            "webDir": "www",
            "bundledWebRuntime": false
          }
          EOF
          mkdir www
          cp -R ../www/. www/
          npx cap add android
          npx cap sync android

      - name: Apply version + orientation
        env:
          VNAME: ${{ steps.cfg.outputs.VNAME }}
          VCODE: ${{ steps.cfg.outputs.VCODE }}
          ORIENT: ${{ steps.cfg.outputs.ORIENT }}
        run: |
          set -e
          cd _cap/android
          # versionName / versionCode in app/build.gradle
          sed -i -E "s/versionCode [0-9]+/versionCode ${VCODE}/" app/build.gradle
          sed -i -E "s/versionName \"[^\"]+\"/versionName \"${VNAME}\"/" app/build.gradle
          # Screen orientation
          if [ "${ORIENT}" != "unspecified" ]; then
            sed -i -E "s|android:screenOrientation=\"[^\"]*\"|android:screenOrientation=\"${ORIENT}\"|" app/src/main/AndroidManifest.xml || true
            # If the attribute isn't there yet, inject it on the .MainActivity line
            grep -q 'android:screenOrientation' app/src/main/AndroidManifest.xml || \
              sed -i -E "s|(android:name=\"\.MainActivity\")|\1\n            android:screenOrientation=\"${ORIENT}\"|" app/src/main/AndroidManifest.xml
          fi

      - name: Apply custom icon
        if: hashFiles('assets/icon.png') != ''
        run: |
          set -e
          for d in _cap/android/app/src/main/res/mipmap-*; do
            [ -d "$d" ] || continue
            cp assets/icon.png "$d/ic_launcher.png"
            cp assets/icon.png "$d/ic_launcher_round.png"
            # Foreground for adaptive icon
            if [ -f "$d/ic_launcher_foreground.png" ]; then
              cp assets/icon.png "$d/ic_launcher_foreground.png"
            fi
          done

      - name: Apply custom splash
        if: hashFiles('assets/splash.png') != ''
        run: |
          set -e
          for d in _cap/android/app/src/main/res/drawable*; do
            [ -d "$d" ] || continue
            cp assets/splash.png "$d/splash.png" || true
          done

      - name: Assemble debug APK
        working-directory: _cap/android
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleDebug

      - name: Collect APK
        run: |
          set -e
          mkdir out
          cp _cap/android/app/build/outputs/apk/debug/app-debug.apk out/app-debug.apk
          ls -l out

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: out/app-debug.apk
          retention-days: 7
